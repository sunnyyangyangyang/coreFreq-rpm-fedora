# RPM-friendly configuration for CoreFreq DKMS module
# This file is provided by the RPM package, not patched.
PACKAGE_NAME="corefreq"
PACKAGE_VERSION="@RPM_VERSION@"
BUILT_MODULE_NAME[0]="corefreqk"
BUILT_MODULE_LOCATION[0]="build" 
DEST_MODULE_LOCATION[0]="/extra"
MAKE[0]="make -C . all"
CLEAN="make clean"
AUTOINSTALL="yes"