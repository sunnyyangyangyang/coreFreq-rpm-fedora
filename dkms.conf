PACKAGE_NAME="corefreq"
PACKAGE_VERSION="@RPM_VERSION@"
BUILT_MODULE_NAME[0]="corefreqk"
BUILT_MODULE_LOCATION[0]="build" 
DEST_MODULE_LOCATION[0]="/extra"
# 在构建 'all' 目标之前，先执行 'clean' 目标
MAKE[0]="make clean && make -C . all"
# 完全移除 DKMS 的 CLEAN 指令
# CLEAN="make clean" 
AUTOINSTALL="yes"

# CORRECTED POST_BUILD (fixed path to match your BUILT_MODULE_LOCATION):
POST_BUILD="if [ -f /etc/pki/corefreq/private_key.priv ] && [ -f /usr/src/kernels/\$kernelver/scripts/sign-file ]; then /usr/src/kernels/\$kernelver/scripts/sign-file sha256 /etc/pki/corefreq/private_key.priv /etc/pki/corefreq/public_key.der \$dkms_tree/\$module/\$module_version/build/corefreqk.ko; fi"
