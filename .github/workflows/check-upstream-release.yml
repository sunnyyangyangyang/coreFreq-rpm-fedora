name: Check for Upstream Release and Update Spec

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs automatically every day at 03:33 UTC
  schedule:
    - cron: '33 3 * * *'

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    # Grant permissions for the workflow to read repository contents and write commits
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest upstream release version
        id: upstream
        run: |
          # --- 健壮性修改 1: 添加错误处理和重试 ---
          # 尝试最多3次，每次间隔10秒，以应对临时的网络或API问题
          API_RESPONSE=$(curl --retry 3 --retry-delay 10 -s "https://api.github.com/repos/cyring/CoreFreq/releases/latest")

          # --- 健壮性修改 2: 检查 API 响应是否有效 ---
          # 首先检查响应是否包含 "tag_name"，防止 jq 出错
          if ! echo "${API_RESPONSE}" | jq -e '.tag_name' > /dev/null; then
            echo "::error::Failed to get valid API response or 'tag_name' is missing."
            echo "API Response was: ${API_RESPONSE}"
            exit 1
          fi

          # --- 健壮性修改 3: 提取版本号并检查是否为 null/空 ---
          LATEST_TAG=$(echo "${API_RESPONSE}" | jq -r .tag_name | sed 's/^v//')

          if [ -z "${LATEST_TAG}" ] || [ "${LATEST_TAG}" == "null" ]; then
            echo "::error::Extracted version is null or empty. Aborting."
            exit 1
          fi
          
          echo "Latest upstream version is: ${LATEST_TAG}"
          echo "version=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Get current spec version
        id: spec
        run: |
          # Grep the Version line from the spec file and extract the version number
          CURRENT_VERSION=$(grep '^Version:' corefreq.spec | awk '{print $2}')
          
          # --- 健壮性修改 4: 检查是否成功提取到当前版本 ---
          if [ -z "${CURRENT_VERSION}" ]; then
            echo "::error::Could not extract current version from corefreq.spec. Aborting."
            exit 1
          fi

          echo "Current spec version is: ${CURRENT_VERSION}"
          echo "version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT

      - name: Compare versions and update if necessary
        # --- 健壮性修改 5: 确保两个版本都有效才进行比较 ---
        if: steps.upstream.outputs.version && steps.spec.outputs.version && steps.upstream.outputs.version != steps.spec.outputs.version
        run: |
          echo "New version found! Updating spec file from ${{ steps.spec.outputs.version }} to ${{ steps.upstream.outputs.version }}..."
          
          # --- 健壮性修改 6: 修正 sed 命令，使用 %global 变量以适应未来的 spec 文件变化 ---
          # 这会同时更新 Version: 和 Source0: 行，更加健壮
          sed -i "s/^\(%global corefreq_version\s\+\).*/\1${{ steps.upstream.outputs.version }}/" corefreq.spec
          
          # 检查 sed 是否成功替换，如果没有，可能是 spec 文件格式变了
          if ! grep -q "Version:\s*${{ steps.upstream.outputs.version }}" corefreq.spec; then
            echo "::error::sed command failed to update the spec file. Manual intervention required."
            exit 1
          fi

          echo "Spec file updated. Adding changelog entry..."

          # --- 新增功能: 自动添加 changelog 条目 ---
          # 获取当前日期
          CHANGELOG_DATE=$(date -R)
          # 获取作者信息
          AUTHOR_INFO="Your Name <your.email@example.com>" # 或者从 git log 获取
          
          # 使用 awk 在 %changelog 之后的第一行插入新条目
          awk -v date="${CHANGELOG_DATE}" -v version="${{ steps.upstream.outputs.version }}" -v author="${AUTHOR_INFO}" \
            '/%changelog/ { print; print "* " date " " author " - " version "-1"; print "- Updated to upstream version " version; print ""; next } 1' \
            corefreq.spec > corefreq.spec.new && mv corefreq.spec.new corefreq.spec

          echo "Committing changes..."
          
          # Configure git with a user name and email for the commit
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add the changed file, commit, and push
          git add corefreq.spec
          git commit -m "chore(release): Bump version to ${{ steps.upstream.outputs.version }}"
          git push
          
      - name: Report no changes
        if: steps.upstream.outputs.version == steps.spec.outputs.version
        run: |
          echo "No new version found. Current version (${{ steps.spec.outputs.version }}) is up-to-date."