name: Check for Upstream Release and Update Spec

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs automatically every day at 03:33 UTC
  schedule:
    - cron: '33 3 * * *'

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    # Grant permissions for the workflow to read repository contents and write commits
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest upstream release version
        id: upstream
        run: |
          # Robustness: Retry curl up to 3 times to handle temporary network/API issues
          API_RESPONSE=$(curl --retry 3 --retry-delay 10 -s "https://api.github.com/repos/cyring/CoreFreq/releases/latest")

          # Robustness: Check if the API response is valid and contains the tag_name
          if ! echo "${API_RESPONSE}" | jq -e '.tag_name' > /dev/null; then
            echo "::error::Failed to get valid API response or 'tag_name' is missing."
            echo "API Response was: ${API_RESPONSE}"
            exit 1
          fi

          # Robustness: Extract the version tag and check that it's not null/empty
          LATEST_TAG=$(echo "${API_RESPONSE}" | jq -r .tag_name | sed 's/^v//')
          if [ -z "${LATEST_TAG}" ] || [ "${LATEST_TAG}" == "null" ]; then
            echo "::error::Extracted version is null or empty. Aborting."
            exit 1
          fi
          
          echo "Latest upstream version is: ${LATEST_TAG}"
          echo "version=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Get current spec version
        id: spec
        run: |
          # CORRECTED: Target the %global variable, not the Version: line.
          # Grep the '%global corefreq_version' line and get the 3rd field.
          CURRENT_VERSION=$(grep '^%global corefreq_version' corefreq-akmod.spec | awk '{print $3}')
          
          # Robustness: Check if the current version was extracted successfully
          if [ -z "${CURRENT_VERSION}" ]; then
            echo "::error::Could not extract current version from corefreq-akmod.spec. Aborting."
            exit 1
          fi

          echo "Current spec version is: ${CURRENT_VERSION}"
          echo "version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT

      - name: Compare versions and update if necessary
        # Robustness: Only run if both versions were successfully extracted and are different
        if: steps.upstream.outputs.version && steps.spec.outputs.version && steps.upstream.outputs.version != steps.spec.outputs.version
        run: |
          echo "New version found! Updating spec file from ${{ steps.spec.outputs.version }} to ${{ steps.upstream.outputs.version }}..."
          
          # CORRECTED: Use the correct filename 'corefreq-akmod.spec'
          # This sed command correctly targets the %global line you are using.
          sed -i "s/^\(%global corefreq_version\s\+\).*/\1${{ steps.upstream.outputs.version }}/" corefreq-akmod.spec
          
          # CORRECTED: The verification check now also looks at the %global line.
          if ! grep -q "^%global corefreq_version\s\+${{ steps.upstream.outputs.version }}" corefreq-akmod.spec; then
            echo "::error::sed command failed to update the spec file. Manual intervention required."
            exit 1
          fi

          echo "Spec file updated. Adding changelog entry..."

          # Automatic Changelog Entry
          CHANGELOG_DATE=$(date -R)
          # Use the standard GitHub Actions bot identity for the commit
          AUTHOR_INFO="github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          
          # Use awk to insert the new entry right after the %changelog directive
          awk -v date="${CHANGELOG_DATE}" -v version="${{ steps.upstream.outputs.version }}" -v author="${AUTHOR_INFO}" \
            '/%changelog/ { print; print "* " date " " author " - " version "-1"; print "- Update to upstream version " version; print ""; next } 1' \
            corefreq-akmod.spec > corefreq-akmod.spec.new && mv corefreq-akmod.spec.new corefreq-akmod.spec

          echo "Committing changes..."
          
          # Configure git with a user name and email for the commit
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add the changed file, commit, and push
          git add corefreq-akmod.spec
          git commit -m "chore(release): Bump version to ${{ steps.upstream.outputs.version }}"
          git push
          
      - name: Report no changes
        if: steps.upstream.outputs.version == steps.spec.outputs.version
        run: |
          echo "No new version found. Current version (${{ steps.spec.outputs.version }}) is up-to-date."